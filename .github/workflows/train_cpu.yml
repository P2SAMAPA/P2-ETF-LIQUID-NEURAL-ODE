name: Train LTC Model (CPU)

on:
  workflow_dispatch:
    inputs:
      epochs:
        description: "Max epochs (300 uses ~100min per universe on free CPU)"
        required: true
        default: "300"
      quick_test:
        description: "Quick smoke test (5 epochs, tiny model)"
        required: false
        default: "false"
        type: boolean

jobs:
  train:
    name: Train — ${{ matrix.universe }} universe
    runs-on: ubuntu-latest
    timeout-minutes: 340
    strategy:
      fail-fast: false
      matrix:
        universe: [fi, equity, combined]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install numpy (pinned)
        run: pip install "numpy>=1.24.0,<2.0.0"

      - name: Install PyTorch CPU
        run: pip install torch==2.1.0+cpu --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          pip install "setuptools>=68.0.0" torchdiffeq==0.2.3 ncps==0.0.7 \
                      "PyWavelets>=1.6.0" pandas pyarrow scikit-learn scipy \
                      huggingface_hub datasets pydantic pydantic-settings rich

      - name: Patch ltc_config.toml for CPU runner
        run: |
          # ltc_config.toml in the repo already has the right model size, epochs,
          # patience etc. We only need to patch the 3 settings that must differ on CPU:
          #   use_closed_form = true   (dopri5 adjoint is too slow on CPU)
          #   adjoint         = false  (same reason)
          #   method          = "rk4"  (stable fixed-step solver; dopri5 needs GPU speed)
          # Everything else (n_neurons=64, epochs=300, lr, batch_size …) comes from
          # ltc_config.toml unchanged.
          sed -i 's/^use_closed_form = false/use_closed_form = true/'  ltc_config.toml
          sed -i 's/^adjoint = true/adjoint = false/'                   ltc_config.toml
          sed -i 's/^method = "dopri5"/method = "rk4"/'                 ltc_config.toml

          # Allow caller to override epochs (default 300 from ltc_config.toml)
          if [ -n "${{ github.event.inputs.epochs }}" ]; then
            sed -i 's/^epochs = .*/epochs = ${{ github.event.inputs.epochs }}/' ltc_config.toml
          fi

          echo "=== CPU-patched ltc_config.toml ==="
          cat ltc_config.toml

      - name: Apply quick-test overrides
        if: ${{ github.event.inputs.quick_test == 'true' }}
        run: |
          # Patch ltc_config.toml directly — match its unindented key format
          sed -i 's/^epochs = .*/epochs = 5/'         ltc_config.toml
          sed -i 's/^n_neurons = .*/n_neurons = 16/'  ltc_config.toml
          sed -i 's/^n_sensory = .*/n_sensory = 8/'   ltc_config.toml
          sed -i 's/^n_inter = .*/n_inter = 6/'       ltc_config.toml
          sed -i 's/^n_command = .*/n_command = 4/'   ltc_config.toml
          sed -i 's/^batch_size = .*/batch_size = 8/' ltc_config.toml
          # window stays at 63 — changing it breaks the feature shape
          echo '=== Quick test config (5 epochs, tiny model) ==='
          cat ltc_config.toml

      - name: Download master data from HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - << 'EOF'
          import os
          from huggingface_hub import hf_hub_download
          path = hf_hub_download(
              repo_id="P2SAMAPA/fi-etf-macro-signal-master-data",
              filename="master_data.parquet",
              repo_type="dataset",
              token=os.environ.get("HF_TOKEN"),
          )
          print(f"Data downloaded: {path}")
          EOF

      - name: Train — ${{ matrix.universe }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          OMP_NUM_THREADS: "4"
          MKL_NUM_THREADS: "4"
        run: |
          mkdir -p checkpoints results
          python train.py \
            --universe ${{ matrix.universe }} \
            --config ltc_config.toml

      - name: Print training summary — ${{ matrix.universe }}
        run: |
          echo "=== Checkpoint ==="
          ls -lh checkpoints/
          if [ -f results/tau_log.json ]; then
            echo "=== Last 3 tau log entries ==="
            python -c "
          import json
          with open('results/tau_log.json') as f:
              log = json.load(f)
          for r in log[-3:]:
              print(r)
            "
          fi

      - name: Evaluate — ${{ matrix.universe }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ ! -f checkpoints/best_val_sharpe.pt ]; then
            echo "ERROR: No checkpoint found — training may have failed or early-stopped before first improvement."
            exit 1
          fi
          python evaluate.py \
            --universe ${{ matrix.universe }} \
            --config ltc_config.toml \
            --checkpoint checkpoints/best_val_sharpe.pt

      - name: Print metrics — ${{ matrix.universe }}
        run: |
          if [ -f results/metrics.json ]; then
            echo "=== Test Set Metrics (${{ matrix.universe }}) ==="
            cat results/metrics.json
          fi


      - name: List results directory — ${{ matrix.universe }}
        if: always()
        run: |
          echo "=== Contents of results/ ==="
          ls -lh results/ 2>/dev/null || echo "(results/ directory not found)"

      # ── Verify scores were pushed by backtester.py, re-push if needed ──────
      - name: Verify & push scores to HuggingFace Dataset — ${{ matrix.universe }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - << 'EOF'
          import os, sys
          import pandas as pd
          from huggingface_hub import HfApi

          UNIVERSE = "${{ matrix.universe }}"
          RESULTS_REPO = "P2SAMAPA/p2-etf-liquid-neural-ode-results"

          # backtester.py already called publisher.push_results() during evaluate.py.
          # This step verifies scores.csv exists and re-pushes if the in-process
          # push failed for any reason (e.g. transient network error).
          scores_path = "results/scores.csv"
          if not os.path.exists(scores_path):
              print(f"ERROR: results/scores.csv not found after evaluate.py.")
              print("backtester.py must be updated to save scores.csv — see fix.")
              import glob
              print(f"results/ contents: {glob.glob('results/*')}")
              sys.exit(1)

          df = pd.read_csv(scores_path)
          print(f"✅ scores.csv found: {len(df)} rows, columns: {list(df.columns)}")

          # Re-push to guarantee delivery (push_results deduplicates, so safe to call twice)
          from publisher import push_results
          push_results(df, token=os.environ["HF_TOKEN"])
          print(f"✅ {UNIVERSE}: {len(df)} rows confirmed in HF dataset")

          # Upload equity_curve as a separate raw file
          ec_path = "results/equity_curve.csv"
          if os.path.exists(ec_path):
              HfApi().upload_file(
                  path_or_fileobj=ec_path,
                  path_in_repo=f"equity_curves/{UNIVERSE}_equity_curve.csv",
                  repo_id=RESULTS_REPO,
                  repo_type="dataset",
                  token=os.environ["HF_TOKEN"],
                  commit_message=f"[CI] {UNIVERSE} equity curve",
              )
              print(f"✅ Pushed equity curve for {UNIVERSE}")
          EOF

      - name: Upload artifacts — ${{ matrix.universe }}
        uses: actions/upload-artifact@v4
        with:
          name: ltc-${{ matrix.universe }}-${{ github.run_id }}
          path: |
            checkpoints/best_val_sharpe.pt
            results/equity_curve.csv
            results/metrics.json
            results/tau_log.json
            results/scores.csv
            ltc_config.toml
          retention-days: 90

      - name: Push checkpoint to HuggingFace Model — ${{ matrix.universe }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - << 'EOF'
          import os
          from huggingface_hub import HfApi

          api      = HfApi()
          token    = os.environ["HF_TOKEN"]
          repo     = "P2SAMAPA/P2-ETF-LIQUID-NEURAL-ODE"
          universe = "${{ matrix.universe }}"

          api.create_repo(repo_id=repo, repo_type="model", token=token, exist_ok=True)

          api.upload_file(
              path_or_fileobj="checkpoints/best_val_sharpe.pt",
              path_in_repo=f"checkpoints/{universe}/best_val_sharpe.pt",
              repo_id=repo, repo_type="model", token=token,
          )
          api.upload_file(
              path_or_fileobj="ltc_config.toml",
              path_in_repo=f"checkpoints/{universe}/ltc_config.toml",
              repo_id=repo, repo_type="model", token=token,
          )
          print(f"Checkpoint pushed to {repo}/checkpoints/{universe}/")
          EOF
