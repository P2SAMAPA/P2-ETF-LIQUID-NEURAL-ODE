name: Train LTC Model (CPU)

on:
  workflow_dispatch:
    inputs:
      epochs:
        description: "Max epochs (recommend 60 for free CPU)"
        required: true
        default: "60"
      quick_test:
        description: "Quick smoke test (5 epochs, tiny model)"
        required: false
        default: "false"
        type: boolean

jobs:
  train:
    name: Train — ${{ matrix.universe }} universe
    runs-on: ubuntu-latest
    timeout-minutes: 340
    strategy:
      fail-fast: false
      matrix:
        universe: [fi, equity, extended, combined]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install numpy (pinned)
        run: pip install "numpy>=1.24.0,<2.0.0"

      - name: Install PyTorch CPU
        run: pip install torch==2.1.0+cpu --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          pip install "setuptools>=68.0.0" torchdiffeq==0.2.3 ncps==0.0.7 \
                      "PyWavelets>=1.6.0" pandas scikit-learn scipy \
                      huggingface_hub datasets pydantic pydantic-settings rich

      - name: Write CPU training config
        run: |
          cat > cpu_train_config.toml << 'EOF'
          [model]
          n_neurons       = 32
          n_sensory       = 16
          n_inter         = 12
          n_command       = 8
          tau_min         = 0.1
          tau_max         = 10.0
          sparsity        = 0.6
          use_closed_form = true
          input_dim       = 0           # auto-derived at runtime
          dropout         = 0.1

          [training]
          lr              = 5e-4
          weight_decay    = 1e-4
          epochs          = ${{ github.event.inputs.epochs }}
          patience        = 15
          batch_size      = 16
          grad_clip       = 1.0
          sharpe_lambda   = 0.1
          warmup_epochs   = 3
          seed            = 42

          [ode]
          method          = "euler"
          rtol            = 1e-2
          atol            = 1e-3
          adjoint         = false

          [data]
          window          = 42
          hf_repo         = "P2SAMAPA/fi-etf-macro-signal-master-data"
          parquet_file    = "master_data.parquet"
          train_end       = "2019-12-31"
          val_end         = "2022-12-31"

          [scoring]
          alpha_amp       = 0.3
          mc_passes       = 20
          ci_level        = 0.95

          [output]
          hf_results_repo = "P2SAMAPA/p2-etf-liquid-neural-ode-results"
          checkpoint_dir  = "checkpoints"
          results_dir     = "results"
          EOF

      - name: Apply quick-test overrides
        if: ${{ github.event.inputs.quick_test == 'true' }}
        run: |
          sed -i 's/^          epochs.*/          epochs = 5/'         cpu_train_config.toml
          sed -i 's/^          n_neurons.*/          n_neurons = 16/'  cpu_train_config.toml
          sed -i 's/^          n_sensory.*/          n_sensory = 8/'   cpu_train_config.toml
          sed -i 's/^          n_inter.*/          n_inter = 6/'       cpu_train_config.toml
          sed -i 's/^          n_command.*/          n_command = 4/'   cpu_train_config.toml
          sed -i 's/^          batch_size.*/          batch_size = 8/' cpu_train_config.toml
          sed -i 's/^          window.*/          window = 21/'         cpu_train_config.toml
          echo "Quick test config active — 5 epochs, tiny model"

      - name: Download master data from HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - << 'EOF'
          import os
          from huggingface_hub import hf_hub_download
          path = hf_hub_download(
              repo_id="P2SAMAPA/fi-etf-macro-signal-master-data",
              filename="master_data.parquet",
              repo_type="dataset",
              token=os.environ.get("HF_TOKEN"),
          )
          print(f"Data downloaded: {path}")
          EOF

      - name: Train — ${{ matrix.universe }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          OMP_NUM_THREADS: "2"
          MKL_NUM_THREADS: "2"
        run: |
          mkdir -p checkpoints results
          python train.py \
            --universe ${{ matrix.universe }} \
            --config cpu_train_config.toml

      - name: Print training summary — ${{ matrix.universe }}
        run: |
          echo "=== Checkpoint ==="
          ls -lh checkpoints/
          if [ -f results/tau_log.json ]; then
            echo "=== Last 3 tau log entries ==="
            python -c "
          import json
          with open('results/tau_log.json') as f:
              log = json.load(f)
          for r in log[-3:]:
              print(r)
            "
          fi

      - name: Evaluate — ${{ matrix.universe }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ ! -f checkpoints/best_val_sharpe.pt ]; then
            echo "ERROR: No checkpoint found — training may have failed or early-stopped before first improvement."
            exit 1
          fi
          python evaluate.py \
            --universe ${{ matrix.universe }} \
            --config cpu_train_config.toml \
            --checkpoint checkpoints/best_val_sharpe.pt

      - name: Print metrics — ${{ matrix.universe }}
        run: |
          if [ -f results/metrics.json ]; then
            echo "=== Test Set Metrics (${{ matrix.universe }}) ==="
            cat results/metrics.json
          fi

      - name: Upload artifacts — ${{ matrix.universe }}
        uses: actions/upload-artifact@v4
        with:
          name: ltc-${{ matrix.universe }}-${{ github.run_id }}
          path: |
            checkpoints/best_val_sharpe.pt
            results/equity_curve.csv
            results/metrics.json
            results/tau_log.json
            cpu_train_config.toml
          retention-days: 90

      - name: Push checkpoint to HuggingFace — ${{ matrix.universe }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - << 'EOF'
          import os
          from huggingface_hub import HfApi

          api      = HfApi()
          token    = os.environ["HF_TOKEN"]
          repo     = "P2SAMAPA/P2-ETF-LIQUID-NEURAL-ODE"
          universe = "${{ matrix.universe }}"

          api.create_repo(repo_id=repo, repo_type="model", token=token, exist_ok=True)

          api.upload_file(
              path_or_fileobj="checkpoints/best_val_sharpe.pt",
              path_in_repo=f"checkpoints/{universe}/best_val_sharpe.pt",
              repo_id=repo, repo_type="model", token=token,
          )
          api.upload_file(
              path_or_fileobj="cpu_train_config.toml",
              path_in_repo=f"checkpoints/{universe}/cpu_train_config.toml",
              repo_id=repo, repo_type="model", token=token,
          )
          print(f"Checkpoint pushed to {repo}/checkpoints/{universe}/")
          EOF
