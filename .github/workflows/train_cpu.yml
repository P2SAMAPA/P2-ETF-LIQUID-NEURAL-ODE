name: Train LTC Model (CPU)

on:
  workflow_dispatch:
    inputs:
      epochs:
        description: "Max epochs (recommend 60 for free CPU)"
        required: true
        default: "60"
      quick_test:
        description: "Quick smoke test (5 epochs, tiny model)"
        required: false
        default: "false"
        type: boolean

jobs:
  train:
    name: Train — ${{ matrix.universe }} universe
    runs-on: ubuntu-latest
    timeout-minutes: 340
    strategy:
      fail-fast: false
      matrix:
        universe: [fi, equity, combined]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install numpy (pinned)
        run: pip install "numpy>=1.24.0,<2.0.0"

      - name: Install PyTorch CPU
        run: pip install torch==2.1.0+cpu --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          pip install "setuptools>=68.0.0" torchdiffeq==0.2.3 ncps==0.0.7 \
                      "PyWavelets>=1.6.0" pandas pyarrow scikit-learn scipy \
                      huggingface_hub datasets pydantic pydantic-settings rich

      - name: Write CPU training config
        run: |
          cat > cpu_train_config.toml << 'EOF'
          [model]
          n_neurons       = 32
          n_sensory       = 16
          n_inter         = 12
          n_command       = 8
          tau_min         = 0.1
          tau_max         = 10.0
          sparsity        = 0.6
          use_closed_form = true
          input_dim       = 0           # auto-derived at runtime
          dropout         = 0.1

          [training]
          lr              = 5e-4
          weight_decay    = 1e-4
          epochs          = ${{ github.event.inputs.epochs }}
          patience        = 15
          batch_size      = 16
          grad_clip       = 1.0
          sharpe_lambda   = 0.1
          warmup_epochs   = 3
          seed            = 42

          [ode]
          method          = "euler"
          rtol            = 1e-2
          atol            = 1e-3
          adjoint         = false

          [data]
          window          = 42
          hf_repo         = "P2SAMAPA/fi-etf-macro-signal-master-data"
          parquet_file    = "master_data.parquet"
          train_end       = "2019-12-31"
          val_end         = "2022-12-31"

          [scoring]
          alpha_amp       = 0.3
          mc_passes       = 20
          ci_level        = 0.95

          [output]
          hf_results_repo = "P2SAMAPA/p2-etf-liquid-neural-ode-results"
          checkpoint_dir  = "checkpoints"
          results_dir     = "results"
          EOF

      - name: Apply quick-test overrides
        if: ${{ github.event.inputs.quick_test == 'true' }}
        run: |
          sed -i 's/^          epochs.*/          epochs = 5/'         cpu_train_config.toml
          sed -i 's/^          n_neurons.*/          n_neurons = 16/'  cpu_train_config.toml
          sed -i 's/^          n_sensory.*/          n_sensory = 8/'   cpu_train_config.toml
          sed -i 's/^          n_inter.*/          n_inter = 6/'       cpu_train_config.toml
          sed -i 's/^          n_command.*/          n_command = 4/'   cpu_train_config.toml
          sed -i 's/^          batch_size.*/          batch_size = 8/' cpu_train_config.toml
          sed -i 's/^          window.*/          window = 21/'         cpu_train_config.toml
          echo "Quick test config active — 5 epochs, tiny model"

      - name: Download master data from HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - << 'EOF'
          import os
          from huggingface_hub import hf_hub_download
          path = hf_hub_download(
              repo_id="P2SAMAPA/fi-etf-macro-signal-master-data",
              filename="master_data.parquet",
              repo_type="dataset",
              token=os.environ.get("HF_TOKEN"),
          )
          print(f"Data downloaded: {path}")
          EOF

      - name: Train — ${{ matrix.universe }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          OMP_NUM_THREADS: "2"
          MKL_NUM_THREADS: "2"
        run: |
          mkdir -p checkpoints results
          python train.py \
            --universe ${{ matrix.universe }} \
            --config cpu_train_config.toml

      - name: Print training summary — ${{ matrix.universe }}
        run: |
          echo "=== Checkpoint ==="
          ls -lh checkpoints/
          if [ -f results/tau_log.json ]; then
            echo "=== Last 3 tau log entries ==="
            python -c "
          import json
          with open('results/tau_log.json') as f:
              log = json.load(f)
          for r in log[-3:]:
              print(r)
            "
          fi

      - name: Evaluate — ${{ matrix.universe }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ ! -f checkpoints/best_val_sharpe.pt ]; then
            echo "ERROR: No checkpoint found — training may have failed or early-stopped before first improvement."
            exit 1
          fi
          python evaluate.py \
            --universe ${{ matrix.universe }} \
            --config cpu_train_config.toml \
            --checkpoint checkpoints/best_val_sharpe.pt

      - name: Print metrics — ${{ matrix.universe }}
        run: |
          if [ -f results/metrics.json ]; then
            echo "=== Test Set Metrics (${{ matrix.universe }}) ==="
            cat results/metrics.json
          fi

      # ── FIX: Push daily scores to the HF Dataset so the Streamlit app loads real data ──
      - name: Push scores to HuggingFace Dataset — ${{ matrix.universe }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - << 'EOF'
          import os
          import json
          import glob
          import pandas as pd
          from datasets import Dataset, load_dataset
          from huggingface_hub import login

          login(token=os.environ["HF_TOKEN"])

          RESULTS_REPO = "P2SAMAPA/p2-etf-liquid-neural-ode-results"
          UNIVERSE     = "${{ matrix.universe }}"

          # ── 1. Collect scores produced by evaluate.py ──────────────────────
          # evaluate.py should write results/scores.csv with columns:
          #   date, ticker, score_raw, score_adj, ci_lower, ci_upper,
          #   tau_mean, fast_frac, rank, universe
          #
          # Fall back gracefully if the file doesn't exist yet.
          scores_path = "results/scores.csv"
          if not os.path.exists(scores_path):
              # Try any CSV in results/
              csvs = glob.glob("results/*.csv")
              if csvs:
                  scores_path = csvs[0]
                  print(f"scores.csv not found — using {scores_path}")
              else:
                  print("WARNING: No scores CSV found. Skipping HF dataset push.")
                  exit(0)

          df_new = pd.read_csv(scores_path)
          df_new["date"]     = pd.to_datetime(df_new["date"]).dt.strftime("%Y-%m-%d")
          df_new["universe"] = UNIVERSE

          # ── 2. Merge with existing dataset (keep history) ──────────────────
          try:
              existing = load_dataset(RESULTS_REPO, split="train")
              df_existing = existing.to_pandas()
              df_existing["date"] = pd.to_datetime(df_existing["date"]).dt.strftime("%Y-%m-%d")

              # Drop rows for same universe+dates we're about to overwrite
              new_dates = set(df_new["date"].unique())
              mask = ~(
                  (df_existing["universe"] == UNIVERSE) &
                  (df_existing["date"].isin(new_dates))
              )
              df_existing = df_existing[mask]

              df_combined = pd.concat([df_existing, df_new], ignore_index=True)
              print(f"Merged: {len(df_existing)} existing + {len(df_new)} new = {len(df_combined)} rows")

          except Exception as e:
              # Dataset is empty or doesn't exist yet — start fresh
              print(f"Could not load existing dataset ({e}). Creating fresh.")
              df_combined = df_new

          df_combined = df_combined.sort_values(["date", "universe", "ticker"]).reset_index(drop=True)

          # ── 3. Push to HuggingFace ──────────────────────────────────────────
          dataset = Dataset.from_pandas(df_combined, preserve_index=False)
          dataset.push_to_hub(
              RESULTS_REPO,
              split="train",
              commit_message=f"[CI] {UNIVERSE} scores — run {os.environ.get('GITHUB_RUN_ID', 'manual')} sha {os.environ.get('GITHUB_SHA', '')[:8]}",
          )
          print(f"✅ Pushed {len(df_combined)} rows to {RESULTS_REPO}")

          # ── 4. Also push equity_curve if present ───────────────────────────
          ec_path = "results/equity_curve.csv"
          if os.path.exists(ec_path):
              from huggingface_hub import HfApi
              api = HfApi()
              api.upload_file(
                  path_or_fileobj=ec_path,
                  path_in_repo=f"equity_curves/{UNIVERSE}_equity_curve.csv",
                  repo_id=RESULTS_REPO,
                  repo_type="dataset",
                  token=os.environ["HF_TOKEN"],
                  commit_message=f"[CI] {UNIVERSE} equity curve",
              )
              print(f"✅ Pushed equity curve for {UNIVERSE}")
          EOF

      - name: Upload artifacts — ${{ matrix.universe }}
        uses: actions/upload-artifact@v4
        with:
          name: ltc-${{ matrix.universe }}-${{ github.run_id }}
          path: |
            checkpoints/best_val_sharpe.pt
            results/equity_curve.csv
            results/metrics.json
            results/tau_log.json
            results/scores.csv
            cpu_train_config.toml
          retention-days: 90

      - name: Push checkpoint to HuggingFace Model — ${{ matrix.universe }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - << 'EOF'
          import os
          from huggingface_hub import HfApi

          api      = HfApi()
          token    = os.environ["HF_TOKEN"]
          repo     = "P2SAMAPA/P2-ETF-LIQUID-NEURAL-ODE"
          universe = "${{ matrix.universe }}"

          api.create_repo(repo_id=repo, repo_type="model", token=token, exist_ok=True)

          api.upload_file(
              path_or_fileobj="checkpoints/best_val_sharpe.pt",
              path_in_repo=f"checkpoints/{universe}/best_val_sharpe.pt",
              repo_id=repo, repo_type="model", token=token,
          )
          api.upload_file(
              path_or_fileobj="cpu_train_config.toml",
              path_in_repo=f"checkpoints/{universe}/cpu_train_config.toml",
              repo_id=repo, repo_type="model", token=token,
          )
          print(f"Checkpoint pushed to {repo}/checkpoints/{universe}/")
          EOF
