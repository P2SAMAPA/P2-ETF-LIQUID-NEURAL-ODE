name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install ruff black

      - name: black check
        run: black --check --target-version py311 .

      - name: ruff check
        run: ruff check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install numpy (pinned)
        run: pip install "numpy>=1.24.0,<2.0.0"

      - name: Install PyTorch CPU
        # Must be before requirements-dev.txt — conftest.py imports torch at collection time
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install all dependencies
        # Install in one step so torchdiffeq, ncps etc. are all present before pytest collects
        run: |
          pip install torchdiffeq==0.2.3 ncps==0.0.7 "PyWavelets>=1.6.0"
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest --cov=. --cov-report=xml -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
        continue-on-error: true
