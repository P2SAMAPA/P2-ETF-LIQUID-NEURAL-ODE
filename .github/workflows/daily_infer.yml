name: Daily Inference

on:
  schedule:
    - cron: "30 22 * * 1-5"   # 22:30 UTC Mon–Fri (after US market close)
  workflow_dispatch:            # allow manual trigger

jobs:
  infer:
    name: Run daily inference and publish to HF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download checkpoint from HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          from huggingface_hub import hf_hub_download
          import shutil, os
          path = hf_hub_download(
              repo_id="P2SAMAPA/P2-ETF-LIQUID-NEURAL-ODE",
              filename="checkpoints/best_val_sharpe.pt",
              repo_type="model",
              token=os.environ["HF_TOKEN"],
          )
          os.makedirs("checkpoints", exist_ok=True)
          shutil.copy(path, "checkpoints/best_val_sharpe.pt")
          print("Checkpoint downloaded.")
          EOF

      - name: Infer FI universe
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python infer_daily.py --universe fi

      - name: Infer Equity universe
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python infer_daily.py --universe equity

      - name: Infer Combined universe
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python infer_daily.py --universe combined
